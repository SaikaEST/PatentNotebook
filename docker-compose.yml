services:
  postgres:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  api:
    build:
      context: ./backend
    env_file: .env
    environment:
      PYTHONPATH: /app:/ep_ingest/src
    depends_on:
      - postgres
      - redis
      - minio
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./ep_ingest:/ep_ingest
      - ./data:/data
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  worker:
    build:
      context: ./backend
    env_file: .env
    environment:
      PYTHONPATH: /app:/ep_ingest/src
    depends_on:
      - postgres
      - redis
      - minio
    volumes:
      - ./backend:/app
      - ./ep_ingest:/ep_ingest
      - ./data:/data
    command: ["celery", "-A", "app.tasks.celery_app", "worker", "-Q", "default,ingest,nlp,export", "-P", "solo", "--loglevel=info"]

  processor:
    build:
      context: ./backend
    env_file: .env
    environment:
      PYTHONPATH: /app:/ep_ingest/src
      OMP_NUM_THREADS: "2"
      OPENBLAS_NUM_THREADS: "2"
      MKL_NUM_THREADS: "2"
      NUMEXPR_NUM_THREADS: "2"
    depends_on:
      - postgres
      - redis
      - minio
    volumes:
      - ./backend:/app
      - ./ep_ingest:/ep_ingest
      - ./data:/data
    command: ["celery", "-A", "app.tasks.celery_app", "worker", "-Q", "process", "-P", "solo", "--concurrency=1", "--loglevel=info"]

  ocr:
    build:
      context: ./backend
    env_file: .env
    environment:
      PYTHONPATH: /app:/ep_ingest/src
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
    depends_on:
      - postgres
      - redis
      - minio
    volumes:
      - ./backend:/app
      - ./ep_ingest:/ep_ingest
      - ./data:/data
    command: ["celery", "-A", "app.tasks.celery_app", "worker", "-Q", "ocr", "-P", "solo", "--concurrency=1", "--loglevel=info"]

  frontend:
    build:
      context: ./frontend
    env_file: .env
    depends_on:
      - api
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    command: ["npm", "run", "dev"]

volumes:
  pgdata:
  miniodata:
